<!-- ========== メール管理 ========== -->
<div id="page-mail-management" class="page">
  <div class="list-page">
    <div class="page-title">メール管理</div>

    <div id="mail-management-status" class="status" style="display:none;"></div>

    <div id="mail-management-table" style="display:none;">
      <div class="mm-toolbar">
        <button class="mm-toggle-btn" id="mm-show-all-btn" onclick="mmToggleShowAll()">全ての行を表示</button>
        <button class="mm-add-row-btn" onclick="mmShowAddModal()">＋ 行を追加</button>
      </div>
      <div class="mm-table-wrapper">
        <table class="mm-table">
          <thead>
            <tr>
              <th>大会名</th>
              <th>級</th>
              <th>送信予定日時</th>
              <th>メール種別</th>
              <th>件名（スレッド）</th>
              <th>フォームリンク</th>
              <th>リマインダー設定</th>
              <th>送信済み</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="mm-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- ===== プレビューモーダル ===== -->
<div id="mm-preview-modal" class="mm-modal-overlay" style="display:none;" onclick="mmClosePreviewModal(event)">
  <div class="mm-modal-box">
    <div class="mm-modal-header">
      <span id="mm-preview-title" class="mm-modal-title">リマインダー確認</span>
      <button class="mm-modal-close" onclick="mmClosePreviewModal()">✕</button>
    </div>
    <div class="mm-modal-body">
      <div class="mm-preview-meta" id="mm-preview-meta"></div>
      <div class="fc-field-row">
        <label class="fc-label" style="width:120px;">送信予定日時</label>
        <input type="datetime-local" id="mm-preview-datetime" class="fc-text-input" onchange="mmRefreshPreview()">
      </div>
      <div id="mm-preview-section">
        <label class="mm-include-not-paid-label">
          <input type="checkbox" id="mm-include-not-paid">
          振込未完了者も本文に含める
        </label>
        <div class="mm-preview-label">メール本文プレビュー</div>
        <textarea id="mm-preview-body" class="mm-preview-textarea" readonly></textarea>
      </div>
    </div>
    <div class="mm-modal-footer">
      <button class="mm-btn-secondary" onclick="mmClosePreviewModal()">キャンセル</button>
      <button class="mm-btn-primary" onclick="mmConfirmSetTrigger()">リマインダーを設定する</button>
    </div>
  </div>
</div>

<!-- ===== 削除確認モーダル ===== -->
<div id="mm-confirm-modal" class="mm-modal-overlay" style="display:none;" onclick="mmCloseConfirmModal(event)">
  <div class="mm-modal-box" style="width:360px;">
    <div class="mm-modal-header">
      <span class="mm-modal-title">確認</span>
      <button class="mm-modal-close" onclick="mmCloseConfirmModal()">✕</button>
    </div>
    <div class="mm-modal-body">
      <p id="mm-confirm-message" style="font-size:0.95rem;line-height:1.6;"></p>
    </div>
    <div class="mm-modal-footer">
      <button class="mm-btn-secondary" onclick="mmCloseConfirmModal()">キャンセル</button>
      <button class="mm-btn-danger" id="mm-confirm-ok-btn" onclick="mmExecuteConfirm()">削除</button>
    </div>
  </div>
</div>

<!-- ===== 行追加モーダル ===== -->
<div id="mm-add-modal" class="mm-modal-overlay" style="display:none;" onclick="mmCloseAddModal(event)">
  <div class="mm-modal-box">
    <div class="mm-modal-header">
      <span class="mm-modal-title">行追加</span>
      <button class="mm-modal-close" onclick="mmCloseAddModal()">✕</button>
    </div>
    <div class="mm-modal-body">
      <div class="fc-field-row">
        <label class="fc-label">大会を検索 <span class="fc-required-mark">*</span></label>
        <select id="mm-add-tournament-select" class="me-select" onchange="mmOnAddTournamentChange()">
          <option value="">-- 大会を選択 --</option>
        </select>
      </div>
      <div class="fc-field-row">
        <label class="fc-label">大会名</label>
        <input type="text" id="mm-add-tournament" class="fc-text-input mm-readonly-input" readonly tabindex="-1">
      </div>
      <div class="fc-field-row">
        <label class="fc-label">級</label>
        <input type="text" id="mm-add-grades" class="fc-text-input mm-readonly-input" readonly tabindex="-1">
      </div>
      <div class="fc-field-row">
        <label class="fc-label">送信予定日時 <span class="fc-required-mark">*</span></label>
        <input type="datetime-local" id="mm-add-datetime" class="fc-text-input">
      </div>
      <div class="fc-field-row">
        <label class="fc-label">メール種別</label>
        <select id="mm-add-type" class="me-select" onchange="mmOnAddTypeChange()">
          <option value="リマインダー">リマインダー</option>
          <option value="振込確認">振込確認</option>
        </select>
      </div>
      <div id="mm-add-thread-row" class="fc-field-row">
        <label class="fc-label">件名（スレッド）</label>
        <input type="text" id="mm-add-thread" class="fc-text-input" placeholder="自動入力">
      </div>
      <div id="mm-add-formlink-row" class="fc-field-row">
        <label class="fc-label">フォームリンク</label>
        <input type="text" id="mm-add-formlink" class="fc-text-input">
      </div>
    </div>
    <div class="mm-modal-footer">
      <button class="mm-btn-secondary" onclick="mmCloseAddModal()">キャンセル</button>
      <button class="mm-btn-primary" onclick="mmSubmitAdd()">追加</button>
    </div>
  </div>
</div>
