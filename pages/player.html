<!-- ========== 選手大会照会 ========== -->
<div id="page-player" class="page">
  <div class="two-col">

    <!-- 左：名簿 -->
    <div class="panel">
      <div class="panel-header">
        名簿
        <span id="member-count" class="count-badge" style="display:none;"></span>
      </div>
      <div class="panel-body">
        <div class="search-bar">
          <input type="text" id="member-search" placeholder="氏名・読みで絞り込み..." oninput="filterMembers()">
          <button onclick="loadMembers()">再読込</button>
        </div>
        <div class="table-wrap">
          <div id="members-status" class="status"><span class="spinner"></span> 読み込み中...</div>
          <table id="members-table" style="display:none;">
            <thead id="members-thead"></thead>
            <tbody id="members-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 右：大会結果 -->
    <div class="panel">
      <div class="panel-header">
        大会結果
        <span id="result-count" class="count-badge" style="display:none;"></span>
      </div>
      <div class="panel-body">
        <div class="search-bar">
          <input type="text" id="result-name" placeholder="選手名（例：山田 太郎）">
          <input type="date" id="result-date" title="日付で絞り込み（省略可）">
          <button onclick="searchResults()">検索</button>
        </div>
        <div class="table-wrap">
          <div id="results-status" class="status">選手名を入力して「検索」を押してください。</div>
          <table id="results-table" style="display:none;">
            <thead>
              <tr><th>大会日</th><th>場所</th><th>抽選公開日</th></tr>
            </thead>
            <tbody id="results-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
