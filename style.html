<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #f5f5f5;
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ========== ログイン画面 ========== */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .login-box {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.25);
    padding: 32px 36px;
    width: 360px;
    max-width: 95vw;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .login-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #2c3e50;
    text-align: center;
    margin-bottom: 4px;
  }
  .login-role-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .login-role-btn {
    padding: 7px 14px;
    border: 2px solid #bdc3c7;
    border-radius: 20px;
    background: #fff;
    color: #555;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .login-role-btn:hover { border-color: #3498db; color: #3498db; }
  .login-role-btn.active { border-color: #3498db; background: #3498db; color: #fff; }
  .login-pw-input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-pw-input:focus { border-color: #3498db; }
  .login-submit-btn {
    padding: 10px;
    background: #2c3e50;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-submit-btn:hover { background: #3d5166; }
  .login-error {
    color: #e74c3c;
    font-size: 0.85rem;
    text-align: center;
    min-height: 1.2em;
  }
  .login-cancel-btn {
    padding: 8px;
    background: #fff;
    color: #666;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-cancel-btn:hover { background: #f0f0f0; }
  .login-logout-btn {
    background: none;
    border: none;
    color: #999;
    font-size: 0.78rem;
    text-align: center;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  .login-logout-btn:hover { color: #e74c3c; }

  /* ヘッダー＋ナビ固定 */
  .sticky-top {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header {
    background: #2c3e50;
    color: #fff;
    padding: 14px 24px;
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  .current-role-badge {
    background: #3498db;
    color: #fff;
    font-size: 0.8rem;
    padding: 3px 12px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .current-role-badge:hover { background: #2980b9; }

  /* タブナビ */
  nav {
    background: #34495e;
    display: flex;
  }
  nav button {
    background: none;
    border: none;
    color: #bdc3c7;
    padding: 12px 24px;
    font-size: 0.95rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  nav button:hover { color: #fff; }
  nav button.active { color: #fff; border-bottom-color: #3498db; }

  /* ========== ロールカラー ========== */
  body.role-announcer { --role-color: #27ae60; --role-color-dark: #1e8449; }
  body.role-apply     { --role-color: #e74c3c; --role-color-dark: #c0392b; }
  body.role-payment   { --role-color: #2980b9; --role-color-dark: #1a6691; }
  body.role-president { --role-color: #8e44ad; --role-color-dark: #6c3483; }

  body[class*="role-"] nav button.active       { border-bottom-color: var(--role-color); }
  body[class*="role-"] .panel-header           { background: var(--role-color-dark); }
  body[class*="role-"] .list-page .page-title  { border-bottom-color: var(--role-color); }
  body[class*="role-"] .me-type-btn:hover      { border-color: var(--role-color); background: color-mix(in srgb, var(--role-color) 10%, #fff); color: var(--role-color-dark); }
  body[class*="role-"] .me-back-btn:focus,
  body[class*="role-"] .me-copy-btn:focus      { outline-color: var(--role-color); }

  /* ページ切替 */
  .page { display: none; flex: 1; }
  .page.active { display: flex; flex-direction: column; }

  /* ===== 選手大会照会：2カラム ===== */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px;
    flex: 1;
  }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  /* パネル */
  .panel {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    background: #2c3e50;
    color: #fff;
    padding: 10px 16px;
    font-size: 0.95rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-body {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    overflow: hidden;
  }

  /* ===== 大会一覧 ===== */
  .list-page {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .list-page .page-title {
    font-size: 1rem;
    font-weight: 600;
    padding-bottom: 8px;
    border-bottom: 2px solid #3498db;
  }

  /* 検索バー */
  .search-bar {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .search-bar input[type="text"],
  .search-bar input[type="date"] {
    padding: 7px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.88rem;
  }
  .search-bar input[type="text"] { flex: 1; }
  .search-bar input[type="date"] { flex: 0 0 auto; }
  .search-bar button {
    padding: 7px 14px;
    background: #3498db;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.88rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .search-bar button:hover { background: #2980b9; }

  /* テーブル共通 */
  .table-wrap {
    flex: 1;
    overflow: auto;
    border: 1px solid #eee;
    border-radius: 4px;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: #34495e;
    color: #fff;
    padding: 8px 12px;
    text-align: left;
    font-size: 0.82rem;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.85rem;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f0f7ff; }

  /* 確認モーダル */
  .confirm-box {
    width: 340px;
    max-width: 92vw;
  }
  .confirm-message {
    font-size: 0.92rem;
    color: #333;
    white-space: pre-wrap;
    margin: 8px 0 18px;
  }
  .confirm-buttons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .confirm-yes-btn {
    padding: 7px 22px;
    background: #2c3e50;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .confirm-yes-btn:hover { background: #3d5166; }
  .confirm-no-btn {
    padding: 7px 22px;
    background: #ecf0f1;
    border: 1px solid #bdc3c7;
    border-radius: 4px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .confirm-no-btn:hover { background: #d5dbdb; }

  /* 日付セルの色分け */
  td.date-past   { background: #d0d0d0; }
  td.date-soon   { background: #ffd5d5; }
  td.date-future { background: #fffacd; }

  /* 済ボタン */
  .done-btn {
    padding: 3px 8px;
    background: #27ae60;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .done-btn:hover { background: #1e8449; }
  .done-btn:disabled { background: #95a5a6; cursor: default; }
  .done-btn-done { background: #7f8c8d !important; }

  /* 完了ボタン */
  .complete-btn {
    padding: 3px 10px;
    background: #f1c40f;
    color: #333;
    border: none;
    border-radius: 4px;
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .complete-btn:hover { background: #d4ac0d; }
  .complete-btn:disabled { background: #95a5a6; color: #fff; cursor: default; }

  /* クリック可能セル・行 */
  td.name-link { color: #3498db; cursor: pointer; text-decoration: underline; }
  td.name-link:hover { color: #2980b9; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: #ddeeff; }

  /* 件数バッジ */
  .count-badge {
    background: #3498db;
    color: #fff;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* 詳細ビュー */
  .detail-view { display: none; flex-direction: column; gap: 12px; flex: 1; }
  .detail-view.active { display: flex; }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: #ecf0f1;
    border: 1px solid #bdc3c7;
    border-radius: 4px;
    font-size: 0.88rem;
    cursor: pointer;
    width: fit-content;
    transition: background 0.2s;
  }
  .back-btn:hover { background: #d5dbdb; }
  .detail-header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-bottom: 8px;
    border-bottom: 2px solid #3498db;
  }
  .detail-title {
    font-size: 1rem;
    font-weight: 600;
  }
  .detail-title-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .detail-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-done    { background: #d4edda; color: #155724; }
  .badge-active  { background: #cce5ff; color: #004085; }
  .badge-warning { background: #fff3cd; color: #856404; }
  .badge-danger  { background: #f8d7da; color: #721c24; }
  .badge-muted   { background: #e9ecef; color: #495057; }

  /* 状態表示 */
  .status {
    text-align: center;
    padding: 24px;
    color: #999;
    font-size: 0.88rem;
  }
  .status.error { color: #e74c3c; }

  /* 詳細ビュー：左右レイアウト */
  .detail-columns {
    display: flex;
    gap: 16px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .detail-left {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  .detail-right {
    width: 210px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* 詳細ビュー：セクションヘッダー（タイトル＋ボタン） */
  .detail-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  /* 詳細列トグルボタン */
  .toggle-btn {
    padding: 3px 10px;
    font-size: 0.78rem;
    background: #ecf0f1;
    border: 1px solid #bdc3c7;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-btn:hover { background: #d5dbdb; }

  /* 詳細ビュー：セクションタイトル */
  .detail-section-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
    padding-left: 4px;
    border-left: 3px solid #3498db;
  }

  /* 詳細ビュー：下部左右レイアウト */
  .detail-bottom-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .detail-section {
    flex: 1;
    min-width: 240px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .detail-section .table-wrap {
    flex: none;
    max-height: 300px;
  }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-box {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    width: 560px;
    max-width: 95vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    background: #2c3e50;
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
    font-size: 0.95rem;
    flex-shrink: 0;
  }
  .modal-close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .modal-close-btn:hover { opacity: 1; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid #eee;
    flex-shrink: 0;
  }
  .modal-footer-btn {
    padding: 7px 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background: #f5f5f5;
    cursor: pointer;
    font-size: 0.88rem;
    transition: background 0.15s;
  }
  .modal-footer-btn:hover { background: #e8e8e8; }
  .modal-footer-btn.primary {
    background: #2980b9;
    color: #fff;
    border-color: #2980b9;
  }
  .modal-footer-btn.primary:hover { background: #1f6fa8; }
  .completion-next-label {
    font-weight: 600;
    color: #2c3e50;
    margin: 10px 0 4px;
  }
  .completion-next-list {
    margin: 0 0 4px 20px;
    padding: 0;
    color: #555;
    font-size: 0.9rem;
    line-height: 1.7;
  }
  .modal-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    overflow: hidden;
  }

  /* 公認/非公認バッジ */
  .official-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .official-badge.is-official { background: #d4edda; color: #155724; }
  .official-badge.is-unofficial { background: #fff3cd; color: #856404; }

  /* 公認/非公認トグル行 */
  .official-toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .official-toggle-btn {
    padding: 2px 10px;
    font-size: 0.76rem;
    background: #ecf0f1;
    border: 1px solid #bdc3c7;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .official-toggle-btn:hover { background: #d5dbdb; }
  .official-toggle-btn:disabled { opacity: 0.5; cursor: default; }

  /* 操作ボタン */
  .op-btn {
    width: 100%;
    padding: 7px 10px;
    background: #2c3e50;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.82rem;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s;
    margin-top: 6px;
  }
  .op-btn:hover { background: #3d5166; }
  .op-btn:disabled { background: #95a5a6; cursor: default; }
  .op-btn.op-btn-done { background: #27ae60; }
  .op-btn.op-btn-done:hover { background: #1e8449; }
  .op-btn.op-btn-danger { background: #c0392b; }
  .op-btn.op-btn-danger:hover { background: #a93226; }
  .op-status {
    font-size: 0.78rem;
    color: #666;
    min-height: 1.2em;
    padding-left: 2px;
  }
  .op-status.ok { color: #27ae60; }
  .op-status.error { color: #e74c3c; }

  /* スプレッドシート模倣テーブル */
  .sheet-table {
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .sheet-table th,
  .sheet-table td {
    border: 1px solid #c0c0c0;
    padding: 5px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
    min-width: 60px;
    max-width: 300px;
  }
  .sheet-table th {
    background: #f3f3f3;
    color: #333;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .sheet-table tr:nth-child(even) td { background: #fafafa; }
  .sheet-table tr:hover td { background: #eef5ff; }

  /* 振込み済みか ボタン */
  .pay-cell {
    overflow: visible;
    max-width: none;
    white-space: nowrap;
  }
  .pay-btn {
    padding: 2px 7px;
    background: #27ae60;
    color: #fff;
    border: none;
    border-radius: 3px;
    font-size: 0.72rem;
    cursor: pointer;
    margin-left: 5px;
    transition: background 0.2s;
  }
  .pay-btn:hover { background: #1e8449; }
  .pay-btn:disabled { background: #95a5a6; cursor: default; }
  .pay-btn-cancel { background: #e67e22; }
  .pay-btn-cancel:hover { background: #ca6f1e; }
  .pay-btn-clear { background: #7f8c8d; }
  .pay-btn-clear:hover { background: #6c7a7d; }

  /* 権限設定テーブル */
  .perm-table { border-collapse: collapse; width: 100%; }
  .perm-table th,
  .perm-table td {
    border: 1px solid #ddd;
    padding: 9px 14px;
    text-align: center;
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: visible;
    max-width: none;
  }
  .perm-table thead th {
    background: #34495e;
    color: #fff;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .perm-label { text-align: left !important; font-weight: 500; color: #333; }
  .perm-check input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

  /* 案内ダブルチェックモーダル（大きめ） */
  .double-check-box {
    width: 680px;
    max-width: 95vw;
    max-height: 88vh;
  }
  .double-check-content {
    max-height: 45vh;
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 12px 16px;
    background: #fafafa;
    font-size: 0.88rem;
    line-height: 1.7;
  }
  /* 案内 HTML 内の要素に基本スタイルを付与 */
  .double-check-content p { margin-bottom: 0.6em; }
  .double-check-content a { color: #2980b9; }
  .double-check-content ul,
  .double-check-content ol { padding-left: 1.4em; margin-bottom: 0.6em; }
  .double-check-content h1,
  .double-check-content h2,
  .double-check-content h3 { font-weight: 700; margin-bottom: 0.4em; }

  /* 案内チェックボタン（大会一覧用） */
  .dc-btn {
    padding: 3px 8px;
    background: #8e44ad;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .dc-btn:hover { background: #7d3c98; }
  .dc-done {
    color: #27ae60;
    font-weight: 700;
    font-size: 0.9rem;
  }

  /* 必要タスクアイテム（詳細右パネル） */
  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 4px;
    border-bottom: 1px solid #eee;
  }
  .task-item:last-child { border-bottom: none; }
  .task-label {
    flex: 1;
    font-size: 0.83rem;
    color: #555;
  }
  .task-btn {
    padding: 3px 10px;
    background: #8e44ad;
